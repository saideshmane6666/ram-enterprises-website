<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100" height="100">
  <!-- Shield Background -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e5a96;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3a5c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a88a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield -->
  <path d="M 100 20 L 160 50 L 160 100 Q 160 160 100 180 Q 40 160 40 100 L 40 50 Z" fill="url(#shieldGradient)" stroke="#0a2442" stroke-width="2"/>
  
  <!-- Shield Border Accent -->
  <path d="M 100 20 L 160 50 L 160 100 Q 160 160 100 180 Q 40 160 40 100 L 40 50 Z" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Checkmark inside shield -->
  <g transform="translate(100, 100)">
    <!-- Checkmark -->
    <polyline points="-20,0 -5,15 20,-10" fill="none" stroke="#00d4aa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- "R" Letter (stylized) -->
  <text x="100" y="85" font-size="50" font-weight="bold" font-family="Arial, sans-serif" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">R</text>
  
  <!-- Shine effect -->
  <ellipse cx="75" cy="55" rx="18" ry="22" fill="white" opacity="0.15"/>
</svg>
